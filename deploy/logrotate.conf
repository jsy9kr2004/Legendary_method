# /etc/logrotate.d/jongbae
# 복사 방법: sudo cp deploy/logrotate.conf /etc/logrotate.d/jongbae
#
# 로그 파일 위치는 .env 의 LOG_DIR 설정에 따라 달라질 수 있음.
# 기본값: ~/Legendary_method/logs/

/home/*/Legendary_method/logs/*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
    dateext
    dateformat -%Y%m%d
    postrotate
        # loguru 는 파일 핸들을 재사용하지 않으므로 SIGHUP 불필요.
        # 스케줄러가 매번 새 파일을 여는 방식이면 아래 줄 필요 없음.
        # systemctl reload jongbae@* 2>/dev/null || true
        :
    endscript
}
