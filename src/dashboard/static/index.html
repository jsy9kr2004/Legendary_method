<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>종배 모니터링 대시보드</title>
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icon.svg" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { mono: ['"JetBrains Mono"', 'monospace'] } } },
    };
  </script>
  <style>
    html, body { background: #0f172a; color: #e2e8f0; font-family: ui-monospace, "JetBrains Mono", monospace; }
    .grade-STRONG { color: #4ade80; }
    .grade-WATCH  { color: #facc15; }
    .grade-NEUTRAL{ color: #94a3b8; }
    .grade-AVOID  { color: #f87171; }
    .card-hold { border-color: #22d3ee; }
    .card-auto { border-color: #fbbf24; }
    .card-rising { border-color: #a78bfa; }
    .card-manual { border-color: #60a5fa; }
    .pulse-trigger { animation: pulse-red 1.2s ease-in-out infinite; }
    @keyframes pulse-red { 0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,0.6);} 50%{box-shadow:0 0 0 8px rgba(248,113,113,0);} }
  </style>
</head>
<body class="min-h-screen">
  <header class="px-4 py-2 flex items-center gap-3 border-b border-slate-700 bg-slate-900/80 sticky top-0 z-10">
    <span id="conn-dot" class="inline-block w-2 h-2 rounded-full bg-slate-500" title="WebSocket 연결"></span>
    <h1 class="text-sm font-bold text-slate-200">종배 모니터링</h1>
    <span id="session-state" class="text-xs px-2 py-0.5 rounded bg-slate-700 text-slate-300">—</span>
    <span id="monitored-count" class="text-xs text-slate-400">0종목</span>
    <span id="updated-at" class="text-xs text-slate-500 ml-auto">갱신 —</span>
    <button id="btn-on"  class="text-xs px-2 py-1 rounded bg-emerald-600 hover:bg-emerald-500">/on</button>
    <button id="btn-off" class="text-xs px-2 py-1 rounded bg-rose-600 hover:bg-rose-500">/off</button>
    <input id="add-code" type="text" inputmode="numeric" maxlength="6" placeholder="6자리"
           class="text-xs w-20 px-2 py-1 rounded bg-slate-800 border border-slate-700 text-slate-200" />
    <button id="btn-add" class="text-xs px-2 py-1 rounded bg-sky-600 hover:bg-sky-500">추가</button>
  </header>

  <main class="p-3">
    <div id="cards" class="grid gap-3 grid-cols-1 md:grid-cols-2 xl:grid-cols-3"></div>
  </main>

  <!-- 보유 등록 모달 -->
  <div id="buy-modal" class="hidden fixed inset-0 z-20 bg-black/60 flex items-center justify-center p-4">
    <div class="bg-slate-800 rounded-lg p-4 max-w-sm w-full border border-slate-600">
      <h3 class="text-sm font-bold mb-3 text-slate-200">보유 등록</h3>
      <div class="text-xs text-slate-300 mb-1">종목: <span id="buy-modal-name" class="font-mono"></span></div>
      <label class="block text-xs text-slate-400 mt-3">매수가 (비우면 현재가 자동)</label>
      <input id="buy-price" type="text" inputmode="numeric"
             class="w-full mt-1 px-2 py-1 rounded bg-slate-900 border border-slate-600 text-slate-100 font-mono" />
      <label class="block text-xs text-slate-400 mt-3">시간 손절 (분, 비우면 기본 10)</label>
      <input id="buy-time-stop" type="text" inputmode="numeric"
             class="w-full mt-1 px-2 py-1 rounded bg-slate-900 border border-slate-600 text-slate-100 font-mono" />
      <div class="flex gap-2 mt-4 justify-end">
        <button id="buy-cancel" class="text-xs px-3 py-1 rounded bg-slate-600 hover:bg-slate-500">취소</button>
        <button id="buy-confirm" class="text-xs px-3 py-1 rounded bg-emerald-600 hover:bg-emerald-500">등록</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
